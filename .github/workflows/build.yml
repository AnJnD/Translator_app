name: Build MeetingTranslator

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe
        run: pyinstaller translator_meeting.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingTranslator-Windows
          path: dist/MeetingTranslator.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app
        run: pyinstaller translator_meeting.spec

      - name: Create .dmg
        run: |
          hdiutil create -volname "MeetingTranslator" \
            -srcfolder dist/MeetingTranslator.app \
            -ov -format UDZO \
            dist/MeetingTranslator.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingTranslator-macOS
          path: |
            dist/MeetingTranslator.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MeetingTranslator-Windows/MeetingTranslator.exe
            MeetingTranslator-macOS/MeetingTranslator.dmg
          generate_release_notes: true
